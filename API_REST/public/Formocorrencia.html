<main>
<form id="formOcorrencia">
<div class="container">

<h1>Comunicado de Ocorrência — Regional BA</h1>

<!-- TIPO DA OCORRÊNCIA -->
<section>
<h2>Classificação da Ocorrência</h2>

<label>Tipo</label>
<select name="tipo" required>
<option value="">Selecione</option>
<option value="fatal">Fatal</option>
<option value="caf">CAF — Com Afastamento</option>
<option value="saf">SAF — Sem Afastamento</option>
<option value="incidente">Incidente</option>
</select>
</section>

<!-- IDENTIFICAÇÃO -->
<section>
<h2>Identificação</h2>

<label>Unidade</label>
<select name="unidade" required>
<option value="">Carregando unidades…</option>
</select>

<label>Empresa / Local</label>
<input type="text" name="empresa_local" placeholder="Ex: 31F Moinho">

<label>Data da Ocorrência</label>
<input type="date" name="data_ocorrencia" required>

<label>Hora Aproximada</label>
<input type="time" name="hora_ocorrencia">
</section>

<!-- COLABORADOR -->
<section>
<h2>Dados do Colaborador</h2>

<label>Nome do Colaborador</label>
<input type="text" name="nome_colaborador" required>

<label>Função</label>
<input type="text" name="funcao" placeholder="Ex: Enlonador, Operador">

<label>Tipo de Colaborador</label>
<label><input type="radio" name="tipo_colaborador" value="proprio" checked onclick="toggleTerceiro()"> Próprio</label>
<label><input type="radio" name="tipo_colaborador" value="terceiro" onclick="toggleTerceiro()"> Terceiro</label>

<div id="sec_terceiro" style="display:none;">
    <label>Nome da Empresa Terceira</label>
    <input type="text" name="empresa_terceiro" placeholder="Ex: Mania Carga">
</div>
</section>

<!-- DESCRIÇÃO -->
<section>
<h2>Descrição da Ocorrência</h2>

<label>Local Específico</label>
<input type="text" name="local_especifico" placeholder="Ex: 31F Enlonamento" maxlength="200">

<label>Descrição detalhada</label>
<textarea name="descricao" required placeholder="Descreva o que aconteceu, como aconteceu e as circunstâncias..."></textarea>

<label>Ações imediatas tomadas</label>
<textarea name="acoes_imediatas" placeholder="Cuidados prestados, encaminhamentos realizados..."></textarea>
</section>

<!-- ATENDIMENTO -->
<section>
<h2>Atendimento e Encaminhamento</h2>

<label>Necessitou de primeiros socorros?</label>
<label><input type="radio" name="primeiros_socorros" value="Sim"> Sim</label>
<label><input type="radio" name="primeiros_socorros" value="Não"> Não</label>

<label>Dias de atestado</label>
<input type="number" name="atestado_dias" min="0" value="0" placeholder="0">

<label>CID</label>
<input type="text" name="cid" placeholder="Ex: S60.0 ou Aguardando" maxlength="30">

<label>Abertura de CAT</label>
<select name="cat_aberta">
<option value="">Selecione</option>
<option value="Sim">Sim</option>
<option value="Não">Não</option>
<option value="Aguardando">Aguardando investigação</option>
</select>
</section>

<!-- OBSERVAÇÕES -->
<section>
<h2>Observações</h2>
<textarea name="observacoes" placeholder="Informações complementares..."></textarea>
</section>

<button type="submit">Enviar Comunicado</button>

</div>
</form>
</main>
