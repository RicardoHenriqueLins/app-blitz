                Ocorrência

<main>

<form id="formBlitz">

<div class="container">

<h1>Blitz de Segurança – Regional BA</h1>

<!-- IDENTIFICAÇÃO -->
<section>
<h2>Identificação</h2>

<label>Nome Completo</label>
<input type="text" name="nome" required>

<!-- ALTERADO: agora populado dinamicamente pelo unidades.js -->
<label>Unidade</label>
<select name="unidade" required>
<option value="">Carregando unidades…</option>
</select>

<label>Tipo de Colaborador</label>
<select name="tipoColaborador" required>
<option value="">Selecione</option>
<option>Próprio</option>
<option>Terceiro</option>
</select>

<label>Turno</label>
<select name="turno" required>
<option value="">Selecione</option>
    <option>ADM</option>
    <option>1º Turno</option>
    <option>2º Turno</option>
    <option>3º Turno</option>
    <option>12x36 Manhã</option>
    <option>12x36 Noite</option>
</select>

</section>

<!-- SETOR -->
<section>
<h2>Setor</h2>

<label>
<input type="radio" name="setor" value="distribuicao"> Distribuição
</label>

<label>
<input type="radio" name="setor" value="armazem"> Armazém
</label>
</section>

<!-- DISTRIBUIÇÃO -->
<section id="distribuicao" class="hidden">

<h2>Checklist – Distribuição</h2>

<label><input type="checkbox" value="Motorista fora da velocidade permitida"> Motorista fora da velocidade permitida</label>
<label><input type="checkbox" value="Motorista fora da via destinada a veículos pesados"> Motorista fora da via destinada a veículos pesados</label>
<label><input type="checkbox" value="Motorista sem cinto de segurança"> Motorista sem cinto de segurança</label>
<label><input type="checkbox" value="Colaborador sem EPIs"> Colaborador sem EPIs</label>
<label><input type="checkbox" value="Pneus desgastados"> Pneus desgastados</label>
<label><input type="checkbox" value="Condição insegura no local de entrega"> Condição insegura no local de entrega</label>
<label><input type="checkbox" value="Motorista subiu no caminhão sem utilização do Apoio."> Motorista subiu no caminhão sem utilização do Apoio.</label>
<label><input type="checkbox" value="Veiculo com uma quantidade insegura de Caixas."> Veiculo com uma quantidade insegura de Caixas.</label>
<label><input type="checkbox" value="Veiculo estacionado fora do local adequado."> Veiculo estacionado fora do local adequado.</label>
<label><input type="checkbox" value="Motorista não tá Sinalizando as Manobras de Forma Correta e antecipada."> Motorista não tá Sinalizando as Manobras de Forma Correta e antecipada.</label>
<label><input type="checkbox" value="O Local de entrega não é bem iluminado e possui obstáculos na via."> O Local de entrega não é bem iluminado e possui obstáculos na via.</label>
<label><input type="checkbox" value="Condição Insegura no Local de Entrega."> Condição Insegura no Local de Entrega.</label>
<label><input type="checkbox" value="Colaborador trabalhando sob os efeitos de álcool e/ou drogas."> Colaborador trabalhando sob os efeitos de álcool e/ou drogas.</label>

<label>7. Outros Pontos de Oportunidades - Distribuição</label>
<textarea name="oportunidadesDistribuicao"></textarea>

</section>

<!-- ARMAZÉM -->
<section id="armazem" class="hidden">

<h2>Checklist – Armazém</h2>

<label><input type="checkbox" value="Faixa de pedestres obstruída"> Faixa de pedestres obstruída</label>
<label><input type="checkbox" value="Movimentação de máquinas próximo a pedestres"> Movimentação de máquinas próximo a pedestres</label>
<label><input type="checkbox" value="Colaborador fora da faixa"> Colaborador fora da faixa</label>
<label><input type="checkbox" value="Colaborador sem EPIs"> Colaborador sem EPIs</label>
<label><input type="checkbox" value="Palete quebrado ou tombado"> Palete quebrado ou tombado</label>
<label><input type="checkbox" value="Saídas de emergência obstruídas"> Saídas de emergência obstruídas</label>
<label><input type="checkbox" value="Colaborador correndo nas dependências da empresa"> Colaborador correndo nas dependências da empresa</label>
<label><input type="checkbox" value="Colaborador operando máquina sem treinamento"> Colaborador operando máquina sem treinamento</label>
<label><input type="checkbox" value="Colaborador desrespeitando sinalizações de segurança"> Colaborador desrespeitando sinalizações de segurança</label>
<label><input type="checkbox" value="Colaborador sob efeito de álcool ou drogas"> Colaborador sob efeito de álcool ou drogas</label>

<label>7. Outros Pontos de Oportunidades - Armazém</label>
<textarea name="oportunidadesArmazem"></textarea>
</section>

<!-- PERGUNTAS GERAIS -->
<section>
<h2>Avaliação da Blitz</h2>

<label>8. Houve reforço positivo?</label>
<label><input type="radio" name="reforco_positivo" value="Sim"> Sim</label>
<label><input type="radio" name="reforco_positivo" value="Não"> Não</label>

<label>9. Houve Feedback positivo?</label>
<label><input type="radio" name="feedback_positivo" value="Sim"> Sim</label>
<label><input type="radio" name="feedback_positivo" value="Não"> Não</label>

<label>10. Orientações passadas</label>
<textarea name="orientacoes"></textarea>

<label>11. Pontos de melhoria na segurança</label>
<textarea name="melhorias"></textarea>

<label>13. Outros pontos de oportunidade</label>
<textarea name="observacao_oportunidades"></textarea>

</section>

<section>
<label>Tipo de Relato</label>
<select name="tipoRelato">
<option>ATO</option>
<option>Condição</option>
</select>

<label>Observações</label>
<textarea name="observacoes"></textarea>
</section>

<button id="ButtonBlitiz" type="submit">Enviar Blitz</button>

</div>

</form>

</main>

<footer id="footer">
    <p id="titulo-footer">Fale com a Segurança do Trabalho</p>
    <div id="contato-footer">
        <span>📧 seguranca@empresa.com</span>
        <span>📞 (11) 99999-9999</span>
    </div>
</footer>

        });
    }
</script>

</html>
